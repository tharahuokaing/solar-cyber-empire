<!DOCTYPE html>
<html lang="km">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solar Cyber Empire | Huokaing Thara</title>

<style>

/* GLOBAL */

body{
margin:0;
overflow:hidden;
background:#000;
font-family:'Courier New','Kantumruy Pro',monospace;
color:#fff;
}

/* MATRIX */

#matrix-canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
opacity:0.2;
}

/* MONITOR */

.monarch-monitor{
position:relative;
z-index:10;
width:85%;
max-width:1200px;
margin:40px auto;
border:2px solid #ffd700;
background:rgba(0,10,20,0.95);
padding:30px;
box-shadow:0 0 50px rgba(255,215,0,0.15),
inset 0 0 20px rgba(0,242,255,0.1);
border-radius:15px;
}

/* HEADER */

.dashboard-header{
display:flex;
justify-content:space-between;
align-items:center;
color:#ffd700;
border-bottom:1px solid rgba(255,215,0,0.3);
padding-bottom:15px;
}

#live-clock{
font-size:28px;
color:#00f2ff;
letter-spacing:3px;
font-weight:bold;
}

#status-tag{
padding:8px 20px;
background:#444;
border-radius:4px;
font-weight:bold;
}

/* TERMINAL */

#main-terminal{
height:350px;
background:rgba(0,5,10,0.9);
border:1px solid #00f2ff;
margin-top:20px;
padding:20px;
overflow-y:auto;
font-size:14px;
line-height:1.6;
}

/* CONTROL PANEL */

.control-panel{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:25px;
}

/* BUTTON */

.royal-btn{
background:rgba(0,242,255,0.05);
border:1px solid #00f2ff;
color:#00f2ff;
padding:15px;
cursor:pointer;
font-weight:bold;
text-transform:uppercase;
letter-spacing:1px;
transition:0.3s;
}

.royal-btn:hover{
background:rgba(0,242,255,0.25);
box-shadow:0 0 20px #00f2ff;
transform:translateY(-3px);
color:#fff;
}

</style>
</head>

<body>

<canvas id="matrix-canvas"></canvas>

<div class="monarch-monitor">

<div class="dashboard-header">

<div>

<h1 style="margin:0;letter-spacing:3px;">
SOLAR CYBER EMPIRE v2.0
</h1>

<p style="margin:5px 0;color:#00f2ff;font-style:italic;">
មហាអធិរាជបញ្ជាការដ្ឋានអវកាស៖ លោកម្ចាស់ ហួកាំង ថារ៉ា
</p>

</div>

<div style="text-align:right">

<div id="live-clock">00:00:00</div>

<div id="status-tag">
SYSTEM LOCKED
</div>

</div>

</div>

<!-- TERMINAL -->

<div id="main-terminal">

<p style="color:#888;font-style:italic">
> ព្រះរាជប្រព័ន្ធកំពុងរង់ចាំការបញ្ជាក់ព្រះបរមអត្តសញ្ញាណ...
</p>

</div>

<!-- CONTROL PANEL -->

<div class="control-panel">

<button class="royal-btn" onclick="runPenTest()">[I] Cyber Pentest</button>

<button class="royal-btn" onclick="runOverflowTest()">[II] Mercury Stability</button>

<button class="royal-btn" onclick="checkGpsRollover()">[III] Saturn Shield</button>

<button class="royal-btn" onclick="calculateRisk()">[IV] Economy Analysis</button>

<button class="royal-btn" onclick="systemHardware()">[V] Mars Droid Army</button>

<button class="royal-btn" onclick="launchSpacecraft()">[VII] Launch Baksey Cham Krong</button>

<button class="royal-btn" onclick="runV2XMonitor()">[VIII] V2X Traffic Monitor</button>

<button class="royal-btn" onclick="playImperialMusic()">[IX] Play Imperial Music</button>

<button class="royal-btn" onclick="stopImperialMusic()">[X] Stop Music</button>

<button class="royal-btn"
onclick="exportReport()"
style="grid-column: span 2;color:#ffd700;border-color:#ffd700">

[VI] Archive Imperial Report

</button>

</div>

</div>

<!-- AUDIO -->

<audio id="bg-music" src="solar_cyber_empire/empire.mp3" loop></audio>
<audio id="sound-click" src="solar_cyber_empire/sound-click.mp3"></audio>

<script>

/* TERMINAL LOG */

function logTerminal(text){

const terminal=document.getElementById("main-terminal")

const line=document.createElement("div")

line.innerHTML="> "+text

terminal.appendChild(line)

terminal.scrollTop=terminal.scrollHeight

}

/* CLOCK */

function updateClock(){

const now=new Date()

document.getElementById("live-clock").innerText=
now.toLocaleTimeString()

}

setInterval(updateClock,1000)

/* MATRIX EFFECT */

const canvas=document.getElementById("matrix-canvas")
const ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

const letters="01"
const fontSize=16
const columns=canvas.width/fontSize

const drops=[]

for(let i=0;i<columns;i++)
drops[i]=1

function drawMatrix(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00f2ff"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

const text=letters.charAt(
Math.floor(Math.random()*letters.length)
)

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(drawMatrix,33)

/* MUSIC */

function playImperialMusic(){

const music=document.getElementById("bg-music")

music.volume=0

music.play().catch(()=>{})

let vol=0

const fade=setInterval(()=>{

if(vol<0.4){

vol+=0.05
music.volume=vol

}else{

clearInterval(fade)

}

},200)

logTerminal("Imperial music activated")

}

function stopImperialMusic(){

document.getElementById("bg-music").pause()

logTerminal("Imperial music stopped")

}

/* CLICK SOUND */

document.querySelectorAll(".royal-btn").forEach(btn=>{

btn.addEventListener("click",()=>{

const click=document.getElementById("sound-click")
if(click) click.play()

})

})

/* SIMULATION FUNCTIONS */

function runPenTest(){
logTerminal("Running cyber penetration test...")
}

function runOverflowTest(){
logTerminal("Checking Mercury system stability...")
}

function checkGpsRollover(){
logTerminal("Scanning Saturn shield protocols...")
}

function calculateRisk(){
logTerminal("Analyzing economic risk models...")
}

function systemHardware(){
logTerminal("Deploying Mars Droid Army...")
}

function launchSpacecraft(){
logTerminal("Launching Baksey Cham Krong spacecraft...")
}

function runV2XMonitor(){
logTerminal("Monitoring V2X traffic network...")
}

function exportReport(){
logTerminal("Archiving imperial system report...")
}

</script>

</body>
</html>
